<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tessera social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#818cf8"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#c026d3"/></linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- header: mark + wordmark -->
  <g transform="translate(80,70)">
    <g stroke="#475569" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <line x1="34" y1="34" x2="86" y2="34"/><line x1="34" y1="34" x2="34" y2="86"/>
      <line x1="86" y1="34" x2="86" y2="86"/><line x1="34" y1="86" x2="86" y2="86"/>
      <line x1="86" y1="86" x2="34" y2="34"/>
    </g>
    <rect x="14" y="14" width="40" height="40" rx="9" fill="url(#g1)"/>
    <rect x="66" y="14" width="40" height="40" rx="9" fill="url(#g2)"/>
    <rect x="14" y="66" width="40" height="40" rx="9" fill="url(#g2)"/>
    <rect x="66" y="66" width="40" height="40" rx="9" fill="url(#g3)"/>
    <text x="135" y="82" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="62" font-weight="700" fill="#e6edf3">tessera</text>
  </g>

  <!-- headline -->
  <text x="80" y="290" font-family="ui-sans-serif,system-ui,Segoe UI,sans-serif" font-size="56" font-weight="800" fill="#f8fafc">Deterministic code graph for AI agents</text>
  <text x="80" y="346" font-family="ui-sans-serif,system-ui,Segoe UI,sans-serif" font-size="28" font-weight="400" fill="#9aa5b1">Stop burning tokens on grep. “Who calls this?” · “Did the model</text>
  <text x="80" y="384" font-family="ui-sans-serif,system-ui,Segoe UI,sans-serif" font-size="28" font-weight="400" fill="#9aa5b1">hallucinate it?” — answered over a Tree-sitter graph in milliseconds.</text>

  <!-- stat chips -->
  <g font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="23" font-weight="600">
    <g transform="translate(80,452)">
      <rect width="322" height="58" rx="12" fill="#0e7490" opacity="0.25"/><rect width="322" height="58" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="22" y="37" fill="#67e8f9">60–900× fewer tokens</text>
    </g>
    <g transform="translate(422,452)">
      <rect width="278" height="58" rx="12" fill="#4338ca" opacity="0.25"/><rect width="278" height="58" rx="12" fill="none" stroke="#818cf8" stroke-width="1.5"/>
      <text x="22" y="37" fill="#a5b4fc">38 ms incremental</text>
    </g>
    <g transform="translate(720,452)">
      <rect width="190" height="58" rx="12" fill="#9d174d" opacity="0.25"/><rect width="190" height="58" rx="12" fill="none" stroke="#f472b6" stroke-width="1.5"/>
      <text x="22" y="37" fill="#f9a8d4">11 languages</text>
    </g>
    <g transform="translate(930,452)">
      <rect width="270" height="58" rx="12" fill="#334155" opacity="0.4"/><rect width="270" height="58" rx="12" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="22" y="37" fill="#cbd5e1">CLI · MCP · library</text>
    </g>
  </g>

  <text x="80" y="588" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="24" fill="#64748b">github.com/iamsaquib8/tessera</text>
  <text x="1200" y="588" text-anchor="end" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" fill="#475569">Apache-2.0 · Rust</text>
</svg>
